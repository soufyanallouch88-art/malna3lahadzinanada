<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>malna3lahadzinkamlanada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow-x: hidden;
        }
        
        .cat-container {
            margin-bottom: 40px;
            animation: bounce 2s infinite;
        }
        
        .cat-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            object-fit: cover;
            border: 8px solid #fff;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px #ff6b6b; }
            to { text-shadow: 0 0 30px #feca57; }
        }
        
        .question {
            font-size: 2rem;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 120px;
        }
        
        .btn-yes {
            background: linear-gradient(45deg, #00b894, #00cec9);
            color: white;
        }
        
        .btn-no {
            background: linear-gradient(45deg, #e17055, #d63031);
            color: white;
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .response {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 30px;
            min-height: 80px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        
        .response.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .heart {
            font-size: 3rem;
            color: #e74c3c;
            animation: heartbeat 1.5s infinite;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
        
        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .question { font-size: 1.5rem; }
            .cat-img { width: 200px; height: 200px; }
            .btn { font-size: 1.2rem; padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <div class="cat-container">
        <img src="https://images.unsplash.com/photo-16128452654b?ixlib=rb-4.0.3&auto=format&fit=crop&w=250&q=80" 
             alt="قطة جميلة" class="cat-img">
    </div>
    
    <h1 class="title">wax kadbghini</h1>
    
    <div class="question">كتبغيني؟</div>
    
    <div class="buttons">
        <button class="btn btn-yes" onclick="showResponse('ah')">ah</button>
        <button class="btn btn-no" onclick="showResponse('la')">la</button>
    </div>
    
    <div id="response" class="response"></div>

    <script>
        function showResponse(choice) {
            const responseEl = document.getElementById('response');
            const buttons = document.querySelector('.buttons');
            
            // إخفاء الأزرار
            buttons.style.display = 'none';
            
            // إظهار الرد
            setTimeout(() => {
                if (choice === 'ah') {
                    responseEl.innerHTML = 'kont 3aaaarf hamdulh ❤️';
                    responseEl.classList.add('show');
                } else {
                    responseEl.innerHTML = 'golihaaa fkar mzian nhisk 😘';
                    responseEl.classList.add('show');
                }
            }, 300);
        }
    </script>
</body>
</html>
